{% extends "admin_base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block t_pwd %}active{% endblock %}
{% block content %}
<div class="toolbar"><h2>Смена пароля</h2></div>
{% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
{% if msg %}<div class="success-msg">{{ msg }}</div>{% endif %}
<div class="form-card">
  <form method="post" action="/admin/password">
    <div class="form-group"><label>Текущий пароль</label><input type="password" name="old_password" required></div>
    <div class="form-group"><label>Новый пароль</label><input type="password" name="new_password" required></div>
    <div class="form-group"><label>Повторите новый пароль</label><input type="password" name="confirm_password" required></div>
    <button type="submit" class="btn-primary">Изменить пароль</button>
  </form>
</div>
{% endblock %}
