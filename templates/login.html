<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Телефонный справочник</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<div class="login-overlay">
  <div class="login-card">
    <div class="login-logo">☎</div>
    <div class="login-title">Панель администратора</div>
    <div class="login-sub">Телефонный справочник АО «ГОКБ «ПРОЖЕКТОР»</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <div class="form-group"><label>Логин</label><input type="text" name="username" placeholder="admin" required></div>
      <div class="form-group"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button type="submit" class="btn-login">Войти</button>
    </form>
    <a href="/" class="back-link">← Вернуться к справочнику</a>
  </div>
</div>
</body>
</html>
